<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>售后换货管理系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;line-height:1.6;min-height:100vh}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a73e8,#0d47a1)}
.login-box{background:#fff;border-radius:12px;padding:40px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-box h2{text-align:center;margin-bottom:8px;font-size:20px}
.login-box p{text-align:center;color:#888;font-size:13px;margin-bottom:20px}
.login-box input{width:100%;padding:10px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.login-btn{width:100%;padding:10px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:500}
.login-btn:hover{background:#1557b0}
.login-error{color:#e53935;font-size:13px;text-align:center;margin-top:8px;display:none}

/* Guest banner */
.guest-banner{background:#fff3cd;color:#856404;padding:8px 16px;text-align:center;font-size:13px;border-bottom:1px solid #ffeeba}

/* Header */
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}
.header-right .role{font-size:12px;opacity:.8;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:10px}
.header-right .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:5px;font-size:12px;cursor:pointer}
.header-right .logout-btn:hover{background:rgba(255,255,255,.25)}

.container{max-width:800px;margin:0 auto;padding:16px}
.body-wrap{display:grid;grid-template-columns:330px 1fr;gap:16px;align-items:stretch}
.body-wrap .panel:nth-child(2){min-height:350px;overflow-x:auto}
.lookup-wrap{margin-top:16px}
@media(max-width:700px){.body-wrap{grid-template-columns:1fr}}

.panel{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.panel-hd{padding:12px 16px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}
.panel-bd{padding:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
.form-group .req{color:#e53935}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #d9d9d9;border-radius:5px;font-size:13px;outline:none;transition:border .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
textarea{resize:vertical}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-row>*{flex:1;min-width:120px}
.carrier-row{display:flex;gap:6px}
.carrier-row select{flex:0 0 140px}
.carrier-row input{flex:1}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border:none;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-outline{background:none;border:1px solid #d9d9d9;color:#555}
.btn-outline:hover{border-color:#1a73e8;color:#1a73e8}
.btn-danger{background:#e53935;color:#fff}
.form-actions{display:flex;gap:8px;padding-top:4px}
/* 图片上传 */
.photo-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.photo-wrap input[type=file]{flex:1;padding:6px;border:1px solid #d9d9d9;border-radius:5px;font-size:13px}
.photo-preview{max-width:120px;max-height:120px;border-radius:5px;border:1px solid #ddd;cursor:pointer}
.photo-notice{color:#e53935;font-size:13px;font-weight:600;padding:6px 10px;background:#fce4ec;border-radius:5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.chip{padding:3px 12px;font-size:11px;border:1px solid #d9d9d9;border-radius:14px;background:#fafafa;cursor:pointer;color:#555;transition:all .15s}
.chip:hover{border-color:#1a73e8;color:#1a73e8;background:#e8f0fe}
.radio-group{display:flex;gap:16px;padding-top:2px}
.radio-group label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;font-weight:400}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#fafafa;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e8e8e8;white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tbody tr:hover{background:#f8fbff}
.empty{text-align:center;color:#999;padding:30px 0!important}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-pending{background:#fff3e0;color:#e65100}
.badge-received{background:#e3f2fd;color:#0d47a1}
.badge-completed{background:#e8f5e9;color:#1b5e20}
.badge-cancelled{background:#fce4ec;color:#880e4f}
.bar{display:flex;align-items:center;gap:10px}
.bar select{width:auto;padding:3px 8px;font-size:12px}
.toolbar{display:flex;gap:4px;flex-wrap:wrap}
.status-sel{padding:2px 6px;font-size:11px;border:1px solid #d9d9d9;border-radius:3px}
.track-link{color:#1a73e8;cursor:pointer;text-decoration:none}
.track-link:hover{text-decoration:underline}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:10px;width:520px;max-width:94vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #e8e8e8}
.modal-hd h3{font-size:15px}
.modal-close{width:30px;height:30px;border:none;background:none;font-size:20px;cursor:pointer;border-radius:50%;color:#999}
.modal-close:hover{background:#f0f0f0;color:#333}
.modal-bd{padding:16px 18px;overflow-y:auto;flex:1}
.logi-loading{text-align:center;color:#999;padding:20px}
.logi-error{text-align:center;color:#e53935;padding:20px}
.logi-info{display:flex;gap:12px;margin-bottom:12px;padding:10px;background:#f8f9fa;border-radius:5px;font-size:12px}
.logi-info div{flex:1}
.logi-info .lbl{color:#888;font-size:11px}
.logi-info .val{font-weight:500}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:#e0e0e0}
.tl-item{position:relative;margin-bottom:14px}
.tl-item::before{content:'';position:absolute;left:-18px;top:4px;width:9px;height:9px;border-radius:50%;background:#e0e0e0;border:2px solid #fff;box-shadow:0 0 0 2px #e0e0e0}
.tl-item:last-child::before{background:#1a73e8;box-shadow:0 0 0 2px #1a73e8}
.tl-time{font-size:11px;color:#999}
.tl-text{font-size:13px;margin-top:2px}
.tl-loc{font-size:11px;color:#888;margin-top:1px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 24px;border-radius:6px;font-size:13px;z-index:999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>瑞明换货系统</h2>
    <p style="margin-bottom:20px;font-size:13px;color:#666">退货换货 · 进度查询</p>
    <button style="width:100%;padding:14px;background:#43a047;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:600;margin-bottom:20px" onclick="guestMode()">📝 客户提交退换货单 →</button>
    <hr style="border:none;border-top:1px solid #e8e8e8;margin-bottom:20px">
    <p style="text-align:center;font-size:13px;color:#888;margin-bottom:10px">管理员入口</p>
    <input type="password" id="adminPwd" placeholder="管理密码" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="login-btn" onclick="adminLogin()">进入后台管理</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp" style="display:none">
  <div class="header" id="appHeader">
    <h1>📦 瑞明换货系统</h1>
    <div class="header-right" id="headerRight"></div>
  </div>
  <div class="guest-banner" id="guestBanner" style="display:none">👤 提交模式 — 你的数据提交后管理员可见</div>
  <div class="container">
    <div class="body-wrap">
    <div class="panel" id="formPanel">
      <div class="panel-hd">📋 新建退换货单</div>
      <div class="panel-bd">
        <form id="frm">
          <div class="form-row">
            <div class="form-group"><label>订单号 <span class="req">*</span></label><input id="orderId" placeholder="如 DD20240618001" required></div>
            <div class="form-group"><label>客户</label><input id="customer" placeholder="姓名/昵称"></div>
          </div>
          <div class="form-group" style="border:2px solid #4caf50;border-radius:8px;padding:12px;background:#f1f8e9;margin-bottom:12px">
            <div style="font-size:13px;font-weight:600;color:#2e7d32;margin-bottom:8px">📬 客户寄回地址（换货新货寄到这里）</div>
            <div class="form-row">
              <div class="form-group" style="flex:3"><label>地址 <span class="req">*</span></label><input id="returnAddress" placeholder="省市区/街道/门牌号"></div>
              <div class="form-group" style="flex:1"><label>联系人 <span class="req">*</span></label><input id="returnContact" placeholder="收件人"></div>
              <div class="form-group" style="flex:1"><label>联系电话 <span class="req">*</span></label><input id="returnPhone" placeholder="手机号"></div>
            </div>
          </div>
          <div class="form-group">
            <label>类型</label>
            <div class="radio-group">
              <label><input type="radio" name="type" value="exchange" checked> 🔄 换货</label>
              <label><input type="radio" name="type" value="refund"> 💰 退货退款</label>
            </div>
          </div>
          <div class="form-group">
            <label>退回快递</label>
            <div class="carrier-row">
              <select id="carrier"></select>
              <input id="trackingNo" placeholder="运单号">
              <button type="button" class="btn btn-sm btn-outline" onclick="handleQuery()">🔍</button>
            </div>
          </div>
          <div class="form-group">
            <label>退回原因</label>
            <div class="chips" id="chips"></div>
            <textarea id="reason" rows="2" placeholder="详细原因..."></textarea>
          </div>
          <div class="form-group" id="sentFields" style="display:none">
            <label style="color:#1a73e8;font-weight:600">📦 寄回给客户（管理员填写）</label>
            <div class="carrier-row">
              <select id="sentCarrier"></select>
              <input id="sentTrackingNo" placeholder="寄回运单号">
            </div>
          </div>
          <div class="photo-notice">⚠️ 注意要拍退回商品照片</div>
          <div class="form-group">
            <label>上传退回商品照片</label>
            <div class="photo-wrap">
              <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()">
              <img id="photoPreview" class="photo-preview" style="display:none">
            </div>
          </div>
          <div class="form-group"><label>客服备注</label><textarea id="note" rows="2" placeholder="内部备注"></textarea></div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ 提交</button>
            <button type="reset" class="btn btn-outline" onclick="resetForm()">清空</button>
          </div>
        </form>
      </div>
    </div>
    <div class="panel" id="adminPanel">
      <div class="panel-hd">
        <span>📄 退换货列表</span>
        <div class="bar">
          <select id="filter" onchange="render()">
            <option value="">全部</option>
            <option value="pending">待处理</option>
            <option value="received">已收到</option>
            <option value="completed">已完成</option>
            <option value="cancelled">已取消</option>
          </select>
          <span id="count" style="font-weight:400;font-size:12px;color:#888"></span>
        </div>
      </div>
      <div class="panel-bd" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th><th>订单号</th><th>客户</th><th>类型</th><th>退回快递</th><th>退回单号</th><th>寄回地址</th><th>寄回单号</th><th>照片</th><th>原因</th><th>状态</th><th>时间</th><th>操作</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 查询进度 → 最底部 -->
  <div class="lookup-wrap">
  <div class="panel" id="lookupPanel">
    <div class="panel-hd" style="cursor:pointer" onclick="toggleLookup()">
      <span>🔍 查进度（输入退回单号或订单号）</span>
      <span style="font-size:11px;color:#888" id="lookupToggle">展开 ▼</span>
    </div>
    <div class="panel-bd" id="lookupBody" style="display:none">
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input id="lookupOrderId" placeholder="输入退回运单号" style="flex:1" onkeydown="if(event.key==='Enter')lookupOrder()">
        <button class="btn btn-primary btn-sm" onclick="lookupOrder()">查询</button>
      </div>
      <div id="lookupResult"></div>
    </div>
  </div>
  </div>

</div>

<!-- 物流弹窗 -->
<div class="modal-overlay" id="logiModal">
  <div class="modal">
    <div class="modal-hd"><h3>🚚 物流跟踪</h3><button class="modal-close" onclick="closeLogistics()">&times;</button></div>
    <div class="modal-bd" id="logiBody"><div class="logi-loading">⌛ 查询中...</div></div>
  </div>
</div>

<script>
const ADMIN_PWD = '020903';  // ← 管理密码，你可以改
const REASONS = ['尺码不合适','质量问题','发错货','颜色不符','7天无理由','商品破损','不喜欢','其他'];
const CARRIERS = [
  {code:'shunfeng',name:'顺丰速运'},{code:'shentong',name:'申通快递'},{code:'yuantong',name:'圆通速递'},
  {code:'zhongtong',name:'中通快递'},{code:'yunda',name:'韵达快递'},{code:'jingdong',name:'京东快递'},
  {code:'ems',name:'EMS'},{code:'youzhengguonei',name:'邮政国内'},{code:'debangwuliu',name:'德邦物流'},
  {code:'huitongkuaidi',name:'百世快递'},{code:'zhaijisong',name:'宅急送'},{code:'tiantian',name:'天天快递'},
  {code:'youshuwuliu',name:'优速快递'},{code:'suer',name:'速尔快递'},{code:'jd',name:'京东物流'}
];
const STATUS = {pending:'待处理',received:'已收到',completed:'已完成',cancelled:'已取消'};
const TYPE = {exchange:'🔄 换货',refund:'💰 退款'};

let isAdmin = false;
let data = [];
let editingId = null;

// ─── 登录 ──────────────────────────────────────────────────
function adminLogin(){
  const pwd = document.getElementById('adminPwd').value;
  fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})})
  .then(r=>r.json()).then(r=>{
    if(r.ok){ isAdmin=true; enterApp(true); }
    else document.getElementById('loginError').style.display='block';
  }).catch(()=>{
    // 后端密码检查失败时的本地兜底
    if(pwd===ADMIN_PWD){ isAdmin=true; enterApp(true); }
    else document.getElementById('loginError').style.display='block';
  });
}
function toggleLookup(){
  const body=document.getElementById('lookupBody');
  const toggle=document.getElementById('lookupToggle');
  if(!body) return;
  const isHidden = body.style.display==='none' || !body.style.display;
  body.style.display = isHidden ? 'block' : 'none';
  if(toggle) toggle.textContent = isHidden ? '收起 ▲' : '展开 ▼';
}
function guestMode(){ isAdmin=false; enterApp(false); }
function enterApp(admin){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('lookupPanel').style.display='block';
  const hr=document.getElementById('headerRight');
  if(admin){
    document.getElementById('guestBanner').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    hr.innerHTML=`<span class="role">🔑 管理员</span><button class="logout-btn" onclick="logout()">退出</button>`;
    loadData();
  } else {
    document.getElementById('guestBanner').style.display='block';
    document.getElementById('adminPanel').style.display='none';
    hr.innerHTML=`<span class="role">👤 提交模式</span>`;
  }
}
function logout(){
  isAdmin=false;
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('adminPwd').value='';
  document.getElementById('loginError').style.display='none';
}

// ─── 数据 ──────────────────────────────────────────────────
function loadData(){
  fetch('/api/returns').then(r=>r.json()).then(d=>{ data=d; render(); }).catch(()=>{});
}
function saveData(){ /* server handles it */ }

// ─── 初始化 ────────────────────────────────────────────────
function init(){
  const sel=document.getElementById('carrier');
  sel.innerHTML='<option value="">— 选择 —</option>';
  const tops=['shunfeng','shentong','yuantong','zhongtong','yunda','jingdong','ems'];
  tops.forEach(c=>{ const x=CARRIERS.find(a=>a.code===c); if(x) sel.innerHTML+=`<option value="${x.code}">${x.name}</option>`; });
  sel.innerHTML+='<option disabled>──────────</option>';
  CARRIERS.forEach(c=>{ if(!tops.includes(c.code)) sel.innerHTML+=`<option value="${c.code}">${c.name}</option>`; });
  // 初始化寄回快递下拉
  const ssel=document.getElementById('sentCarrier');
  ssel.innerHTML='<option value="">— 选择寄回快递 —</option>';
  tops.forEach(c=>{ const x=CARRIERS.find(a=>a.code===c); if(x) ssel.innerHTML+=`<option value="${x.code}">${x.name}</option>`; });
  ssel.innerHTML+='<option disabled>──────────</option>';
  CARRIERS.forEach(c=>{ if(!tops.includes(c.code)) ssel.innerHTML+=`<option value="${c.code}">${c.name}</option>`; });

  const ce=document.getElementById('chips');
  REASONS.forEach(r=>{ const b=document.createElement('button'); b.type='button'; b.className='chip'; b.textContent=r; b.onclick=()=>{ const ta=document.getElementById('reason'); ta.value=ta.value?ta.value+'；'+r:r; ta.focus(); }; ce.appendChild(b); });
  document.getElementById('frm').addEventListener('submit', handleSubmit);
  // 直接显示登录页
}
init();

// ─── 图片 ────────────────────────────────────────────────────
function previewPhoto(){
  const input=document.getElementById('photoInput');
  const preview=document.getElementById('photoPreview');
  if(input.files&&input.files[0]){
    const reader=new FileReader();
    reader.onload=function(e){ preview.src=e.target.result; preview.style.display='block'; };
    reader.readAsDataURL(input.files[0]);
  }
}

function uploadPhoto(id, callback){
  const input=document.getElementById('photoInput');
  if(!input.files||!input.files[0]){ if(callback) callback(); return; }
  const reader=new FileReader();
  reader.onload=function(e){
    fetch('/api/upload/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:e.target.result})})
    .then(r=>r.json()).then(r=>{ if(callback) callback(); }).catch(()=>{ if(callback) callback(); });
  };
  reader.readAsDataURL(input.files[0]);
}

function viewPhoto(id){
  fetch('/api/photos/'+id).then(r=>r.json()).then(list=>{
    if(list.length){ window.open(list[0].url,'_blank'); }
    else toast('暂无照片');
  }).catch(()=>toast('加载失败'));
}

// ─── CRUD ───────────────────────────────────────────────────
function handleSubmit(e){
  e.preventDefault();
  const orderId=document.getElementById('orderId').value.trim();
  if(!orderId) return toast('订单号不能为空');
  
  // 读取照片为 base64
  const fileInput=document.getElementById('photoInput');
  const doSubmit = function(photoBase64){
    const body={
      order_id: orderId,
      customer: document.getElementById('customer').value.trim(),
      return_address: document.getElementById('returnAddress').value.trim(),
      return_contact: document.getElementById('returnContact').value.trim(),
      return_phone: document.getElementById('returnPhone').value.trim(),
      type: document.querySelector('input[name="type"]:checked').value,
      carrier: document.getElementById('carrier').value,
      tracking_no: document.getElementById('trackingNo').value.trim(),
      reason: document.getElementById('reason').value.trim(),
      note: document.getElementById('note').value.trim(),
      sent_carrier: document.getElementById('sentCarrier').value,
      sent_tracking_no: document.getElementById('sentTrackingNo').value.trim(),
    };
    if(photoBase64) body.image = photoBase64;
    
    const url = editingId ? `/api/returns/${editingId}` : '/api/returns';
    const method = editingId ? 'PUT' : 'POST';
    fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(r=>r.json()).then(r=>{
      if(r.error) return toast('❌ '+r.error);
      resetForm();
      if(isAdmin) loadData();
      const statusText = {pending:'待处理',received:'已收到',completed:'已完成',cancelled:'已取消'};
      const s = r.item ? statusText[r.item.status]||r.item.status : '待处理';
      if(!isAdmin){
        const el = document.getElementById('lookupResult');
        el.innerHTML = `<div style="padding:14px;background:#e8f5e9;border-radius:6px;font-size:14px">
          <strong>✅ 提交成功！</strong><br><br>
          📦 订单号：${orderId}<br>
          📋 当前状态：<span class="badge badge-pending">${s}</span><br><br>
          <span style="font-size:12px;color:#666">你可以用底部的「查询退换货进度」功能，输入退回单号随时查看</span>
        </div>`;
        document.getElementById('orderId').focus();
      } else {
        toast('✅ 提交成功！');
      }
    }).catch((e)=>toast("❌ 提交失败，照片可能太大（请压缩到5MB以内）"));
  };
  
  // 如果有照片，先读取再提交
  if(fileInput.files&&fileInput.files[0]){
    const reader=new FileReader();
    reader.onload=function(e){ doSubmit(e.target.result); };
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    doSubmit(null);
  }
}

function resetForm(){ editingId=null; document.getElementById('frm').reset(); document.getElementById('orderId').focus(); document.getElementById('sentFields').style.display='none'; }

function editItem(id){
  if(!isAdmin) return;
  const item=data.find(d=>d.id===id);
  if(!item) return;
  editingId=id;
  document.getElementById('sentFields').style.display='block';
  document.getElementById('orderId').value=item.order_id;
  document.getElementById('customer').value=item.customer;
  document.getElementById('returnAddress').value=item.return_address||'';
  document.getElementById('returnContact').value=item.return_contact||'';
  document.getElementById('returnPhone').value=item.return_phone||'';
  document.querySelector(`input[name="type"][value="${item.type}"]`).checked=true;
  document.getElementById('carrier').value=item.carrier;
  document.getElementById('trackingNo').value=item.tracking_no;
  document.getElementById('reason').value=item.reason;
  document.getElementById('note').value=item.note;
  document.getElementById('sentCarrier').value=item.sent_carrier||'';
  document.getElementById('sentTrackingNo').value=item.sent_tracking_no||'';
  document.getElementById('formPanel').scrollIntoView({behavior:'smooth'});
}
function setStatus(id, status){
  if(!status||!isAdmin) return;
  fetch(`/api/returns/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})})
  .then(r=>r.json()).then(r=>{ if(r.ok) loadData(); });
}

function deleteItem(id){
  if(!isAdmin) return;
  if(!confirm('确定删除这条记录？')) return;
  fetch(`/api/returns/${id}`,{method:'DELETE'})
  .then(r=>r.json()).then(r=>{ if(r.ok) loadData(); });
}

// ─── 渲染 ───────────────────────────────────────────────────
function render(){
  const filter=document.getElementById('filter').value;
  let list=filter?data.filter(d=>d.status===filter):data;
  const tbody=document.getElementById('tbody');
  if(!list.length){
    tbody.innerHTML='<tr><td colspan="13" class="empty">暂无数据</td></tr>';
    document.getElementById('count').textContent='0 条'; return;
  }
  document.getElementById('count').textContent=`${list.length} 条`;
  tbody.innerHTML=list.map(item=>{
    const c=CARRIERS.find(x=>x.code===item.carrier);
    const addrParts = [];
    if(item.return_contact) addrParts.push(item.return_contact);
    if(item.return_phone) addrParts.push(item.return_phone);
    if(item.return_address) addrParts.push(item.return_address);
    const addrStr = addrParts.join(' | ');
    return `<tr>
      <td>${item.id}</td><td><strong>${item.order_id}</strong></td>
      <td>${item.customer||'—'}</td>
      <td>${TYPE[item.type]||item.type}</td>
      <td>${c?c.name:item.carrier||'—'}</td>
      <td>${item.tracking_no?`<a class="track-link" onclick="queryLogistics('${item.carrier}','${item.tracking_no}')">🔙 ${item.tracking_no}</a>`:'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${addrStr}">${addrStr||'—'}</td>
      <td>${item.sent_tracking_no?`<a class="track-link" onclick="queryLogistics('${item.sent_carrier||'shunfeng'}','${item.sent_tracking_no}')">📦 ${item.sent_tracking_no}</a>`:'—'}</td>
      <td><span class="track-link" onclick="viewPhoto(${item.id})">📷 查看</span></td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.reason}">${item.reason||'—'}</td>
      <td><span class="badge badge-${item.status}">${STATUS[item.status]||item.status}</span></td>
      <td style="white-space:nowrap;font-size:11px">${item.created_at}</td>
      <td><div class="toolbar">
        <button class="btn btn-sm btn-outline" onclick="editItem(${item.id})">✏️</button>
        <select class="status-sel" onchange="setStatus(${item.id},this.value)"><option value="">状态</option>
          <option value="pending">待处理</option><option value="received">已收到</option>
          <option value="completed">已完成</option><option value="cancelled">已取消</option></select>
        <button class="btn btn-sm btn-outline" style="color:#e53935;border-color:#e53935" onclick="deleteItem(${item.id})">🗑</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ─── 物流 ──────────────────────────────────────────────────
function handleQuery(){
  const carrier=document.getElementById('carrier').value;
  const no=document.getElementById('trackingNo').value.trim();
  if(!carrier||!no) return toast('请选择快递并填写运单号');
  queryLogistics(carrier,no);
}
// ─── 查询进度（客户查自己订单状态） ────────────────────
async function lookupOrder(){
  const orderId = document.getElementById('lookupOrderId').value.trim();
  if(!orderId) return toast('请输入退回单号或订单号');
  try{
    const resp = await fetch('/api/returns');
    const list = await resp.json();
    // 同时按订单号和运单号查询
    const found = list.filter(d => d.order_id.includes(orderId) || d.tracking_no.includes(orderId) || d.sent_tracking_no.includes(orderId));
    const el = document.getElementById('lookupResult');
    if(!found.length){
      el.innerHTML = '<div style="padding:12px;color:#e53935;background:#fce4ec;border-radius:5px;font-size:13px">❌ 未找到记录，请检查单号</div>';
    } else {
      el.innerHTML = found.map(d => {
        const c = CARRIERS.find(x => x.code === d.carrier);
        const sc = CARRIERS.find(x => x.code === d.sent_carrier);
        return `<div style="padding:10px 12px;background:#f0f7ff;border-radius:5px;margin-bottom:6px;font-size:13px">
          <div style="font-weight:600">📦 ${d.order_id}</div>
          <div style="margin-top:4px;color:#555">
            🔙 退回: ${c?c.name:d.carrier||'—'} ${d.tracking_no||''}<br>
            ${d.sent_tracking_no ? '📦 寄回: '+ (sc?sc.name:d.sent_carrier||'—') +' '+ d.sent_tracking_no +'<br>' : ''}
            原因: ${d.reason||'—'}<br>
            <span class="track-link" onclick="viewPhoto(${d.id})">📷 查看退回照片</span><br>
            状态: <span class="badge badge-${d.status}">${STATUS[d.status]||d.status}</span>
            ${d.updated_at ? '<br>更新时间: '+d.updated_at : ''}
          </div>
        </div>`;
      }).join('');
    }
  }catch(e){
    document.getElementById('lookupResult').innerHTML = '<div style="color:#e53935;font-size:13px">❌ 查询失败，请稍后重试</div>';
  }
}

async function queryLogistics(carrier, trackingNo){
  const modal=document.getElementById('logiModal');
  const body=document.getElementById('logiBody');
  modal.classList.add('show');
  body.innerHTML='<div class="logi-loading">🔍 正在查询物流...</div>';
  try{
    const resp = await Promise.race([
      fetch(`/api/logistics/${carrier}/${trackingNo}`),
      new Promise((_,reject) => setTimeout(() => reject(new Error('timeout')), 15000))
    ]);
    const data = await resp.json();
    if(data.error||!data.updates||!data.updates.length){
      body.innerHTML=`<div class="logi-error">❌ ${data.error||'暂未查询到物流信息'}</div>`; return;
    }
    let html=`<div class="logi-info"><div><div class="lbl">状态</div><div class="val">${data.statusText}</div></div><div><div class="lbl">运单号</div><div class="val">${data.trackingNo}</div></div></div><div class="timeline">`;
    data.updates.forEach(d=>{html+=`<div class="tl-item"><div class="tl-time">${d.time}</div><div class="tl-text">${d.context}</div>${d.location?`<div class="tl-loc">📍 ${d.location}</div>`:''}</div>`;});
    html+='</div>';
    body.innerHTML=html;
  }catch(e){
    body.innerHTML='<div class="logi-error">❌ 查询超时，请稍后重试</div>';
  }
}
function closeLogistics(){ document.getElementById('logiModal').classList.remove('show'); }
document.getElementById('logiModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeLogistics(); });

// ─── Toast ──────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._timer); el._timer=setTimeout(()=>{el.style.display='none';},2500);
}
</script>
